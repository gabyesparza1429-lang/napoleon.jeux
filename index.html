<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Napoléon : Mission Mémoire (Gaby & Sergio)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700&display=swap');
        
        :root {
            --parchment: #FDF5E6;
            --ink: #4B3621;
            --sepia: #6F4E37;
        }

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #E5D3B3; color: var(--ink); font-family: 'Inter', sans-serif; }
        #main-container { display: flex; height: 100vh; width: 100vw; }
        
        /* Panel Izquierdo UI */
        #left-panel { 
            flex: 0 0 450px; 
            background-color: var(--parchment); 
            border-right: 6px double var(--sepia); 
            padding: 2rem; 
            display: flex; 
            flex-direction: column; 
            z-index: 1000; 
            box-shadow: 10px 0 25px rgba(0,0,0,0.3); 
        }

        /* Panel del Mapa */
        #map-panel { 
            flex: 1; 
            position: relative; 
            background-image: url('mapa_napoleon.jpg'); 
            background-size: 100% 100%; 
            background-repeat: no-repeat; 
            background-position: center; 
            border: 12px solid var(--sepia); 
        }

        /* Números del mapa */
        .map-node { 
            position: absolute; width: 65px; height: 65px; border-radius: 50%; background: #D2B48C; 
            border: 4px solid var(--sepia); display: flex; align-items: center; justify-content: center; 
            font-family: 'Cinzel', serif; font-weight: bold; font-size: 28px; transform: translate(-50%, -50%); 
            z-index: 500; cursor: not-allowed; opacity: 0.4; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 3px 3px 10px rgba(0,0,0,0.5);
        }

        .map-node.active { background: #CD853F; color: white; opacity: 1; cursor: pointer; scale: 1.25; box-shadow: 0 0 25px #CD853F; }
        .map-node.completed { background: #2D5A27; color: white; opacity: 1; }
        .map-node.completed::after { content: '✓'; position: absolute; font-size: 14px; bottom: -8px; color: #39FF14; font-weight: bold; }

        /* Tipografía Grande */
        #question-text { font-size: 1.6rem; line-height: 1.3; margin-bottom: 2rem; font-weight: 800; color: #2c1a0a; }
        .summary-content { font-size: 1.2rem; line-height: 1.7; }

        /* Botones de Opción con Feedback */
        .btn-choice { 
            background: white; border: 3px solid var(--sepia); padding: 18px; margin: 10px 0; 
            width: 100%; text-align: left; border-radius: 12px; font-size: 1.2rem; color: var(--ink); 
            transition: all 0.2s ease; font-weight: 600; cursor: pointer;
        }
        .btn-choice:hover:not(:disabled) { background: #F5E6D3; transform: scale(1.02); }

        /* Estados de respuesta */
        .choice-correct { background-color: #22c55e !important; color: white !important; border-color: #166534 !important; }
        .choice-incorrect { background-color: #ef4444 !important; color: white !important; border-color: #991b1b !important; }
        
        @keyframes blink-green {
            0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; }
        }
        .highlight-correct { animation: blink-green 0.5s 3; border-color: #22c55e !important; background-color: #dcfce7 !important; }

        .feedback-area { display: none; padding: 15px; margin-top: 15px; border-radius: 12px; font-weight: bold; font-size: 1.1rem; }
        .hidden { display: none !important; }
        .font-fantasy { font-family: 'Cinzel', serif; }
    </style>
</head>
<body>

<div id="main-container">
    <!-- UI Izquierda -->
    <div id="left-panel">
        <div class="bg-[#EAD8C0] flex justify-between items-center p-4 rounded-xl border-2 border-[#6F4E37] mb-6">
            <div>
                <span class="text-xs uppercase font-black text-amber-900 tracking-tighter">Vies de Sergio</span>
                <div id="hp-display" class="text-4xl text-red-600 mt-1 tracking-widest">❤️❤️❤️</div>
            </div>
            <div class="text-right">
                <p class="font-fantasy text-[10px] opacity-70">Gaby Projets</p>
                <p id="info-tag" class="text-xs font-black uppercase text-[#6F4E37]">Mission Histoire</p>
            </div>
        </div>

        <div id="game-content" class="flex-1 flex flex-col justify-center overflow-y-auto">
            
            <!-- Pantalla Inicio -->
            <div id="start-screen" class="text-center py-6 space-y-8">
                <h1 class="text-4xl font-fantasy text-amber-950 underline decoration-double decoration-amber-800">NAPOLÉON</h1>
                <p class="text-xl italic text-amber-900 font-medium">Bonjour Sergio ! Clique sur le <b>Numéro 1</b> sur la carte pour commencer ta mission.</p>
                <div class="pt-10 opacity-40 text-[10px] font-bold uppercase tracking-widest">Logiciel de Mémoire v4.0</div>
            </div>

            <!-- Fase de Estudio -->
            <div id="summary-screen" class="hidden flex flex-col h-full">
                <h2 class="text-3xl font-fantasy border-b-4 border-amber-800 pb-2 mb-4" id="summary-title"></h2>
                <div id="summary-text" class="summary-content text-justify space-y-6 bg-amber-50 p-6 rounded-2xl border-2 border-amber-200 overflow-y-auto max-h-[60vh]"></div>
                <button onclick="startQuiz()" class="w-full mt-auto bg-[#4B3621] text-white py-6 rounded-2xl font-black uppercase text-base tracking-widest shadow-2xl hover:bg-black transition-all">J'AI TOUT LU, COMMENCER ➔</button>
            </div>

            <!-- Quiz -->
            <div id="quiz-screen" class="hidden space-y-4">
                <div class="flex justify-between items-end mb-2">
                    <span id="q-counter" class="text-sm font-black bg-amber-900 text-white px-3 py-1 rounded-full">1/5</span>
                </div>
                <p id="question-text"></p>
                <div id="options-grid" class="space-y-3"></div>
                <div id="feedback-msg" class="feedback-area"></div>
                <button id="next-btn" onclick="processNextQuestion()" class="hidden w-full mt-8 bg-[#4B3621] text-white py-5 rounded-2xl font-black text-xl shadow-2xl hover:bg-black">CONTINUER ➔</button>
            </div>

            <!-- Pantalla Final -->
            <div id="end-screen" class="hidden text-center py-10 space-y-8">
                <h2 id="end-title" class="text-5xl font-fantasy"></h2>
                <p id="end-message" class="text-2xl font-medium"></p>
                <button onclick="location.reload()" class="bg-[#4B3621] text-white px-12 py-6 rounded-2xl font-black text-2xl uppercase tracking-tighter">RECOMMENCER</button>
            </div>

        </div>
    </div>

    <!-- Panel del Mapa -->
    <div id="map-panel">
        <!-- Nodos dinámicos -->
    </div>

</div>

<script>
    const themes = [
        {
            title: "I. Jeunesse & Ascension",
            pos: {t: 82, l: 50}, // Córcega (Abajo centro)
            info: "Sergio, lis attentivement : Napoléon Bonaparte est né le <b>15 août 1769 à Ajaccio</b>, en Corse. À l'école militaire, il devient un expert en <b>Artillerie</b> (le maniement des canons). Grâce au chaos de la <b>Révolution française</b>, il prouve son talent et devient <b>Général</b> à seulement 24 ans. Ses soldats l'appelaient affectueusement le <b>'Petit Caporal'</b>.",
            questions: [
                {q: "Où est né Napoléon Bonaparte en 1769 ?", opts: ["Ajaccio", "Paris", "Bastia", "Marseille"], c: 0, w: "Il est né à Ajaccio en Corse."},
                {q: "Dans quelle arme militaire était-il expert ?", opts: ["Artillerie", "Marine", "Cavalerie", "Infanterie"], c: 0, w: "Il était un maître des canons (Artillerie)."},
                {q: "Quel grade a-t-il obtenu à 24 ans ?", opts: ["Général", "Capitaine", "Colonel", "Sergent"], c: 0, w: "Il est devenu Général de brigade très jeune."},
                {q: "Quel événement a permis son ascension ?", opts: ["La Révolution française", "Un héritage", "Le hasard", "Le Roi"], c: 0, w: "La Révolution lui a permis de monter en grade."},
                {q: "Quel était son surnom affectueux ?", opts: ["Le Petit Caporal", "L'Ogre", "Le Grand", "L'Aigle"], c: 0, w: "Surnommé le Petit Caporal par ses hommes."}
            ]
        },
        {
            title: "II. Le Pouvoir (18 Brumaire)",
            pos: {t: 30, l: 35}, // París (Noroeste)
            info: "Le 9 novembre <b>1799</b>, Napoléon prend le pouvoir lors du coup d'État du <b>18 Brumaire</b>. Il stabilise la France en créant le <b>Franc Germinal</b> (une monnaie solide en or). Il signe aussi le <b>Concordat</b> en 1801 avec le Pape pour ramener la paix religieuse. Il devient alors <b>Premier Consul</b>.",
            questions: [
                {q: "En quelle année Napoléon prend-il le pouvoir ?", opts: ["1799", "1804", "1789", "1815"], c: 0, w: "Il prend le pouvoir en 1799."},
                {q: "Quel est le nom de son coup d'État ?", opts: ["18 Brumaire", "La Bastille", "Thermidor", "Waterloo"], c: 0, w: "C'est le célèbre 18 Brumaire."},
                {q: "Quelle monnaie d'or a-t-il créée ?", opts: ["Franc Germinal", "Euro", "Livre", "Dollar"], c: 0, w: "Le Franc Germinal a stabilisé l'économie."},
                {q: "Quel accord a-t-il signé avec le Pape ?", opts: ["Le Concordat", "Le Code Civil", "La Trêve", "La Paix"], c: 0, w: "Il a signé le Concordat en 1801."},
                {q: "Quel titre portait-il en 1799 ?", opts: ["Premier Consul", "Empereur", "Roi", "Président"], c: 0, w: "Il a dirigé le Consulat."}
            ]
        },
        {
            title: "III. L'Empire (1804)",
            pos: {t: 45, l: 55}, // Italia/Milán (Centro-Este)
            info: "Sacré <b>Empereur</b> en <b>1804</b> à Notre-Dame, il se couronne <b>lui-même</b> pour montrer son indépendance. Son plus grand héritage est le <b>Code Civil</b> (ses lois unifiées). Il crée aussi la <b>Légion d'Honneur</b> pour récompenser le mérite et fonde les <b>Lycées</b> pour l'éducation des cadres.",
            questions: [
                {q: "En quelle année a-t-il été sacré Empereur ?", opts: ["1804", "1800", "1799", "1812"], c: 0, w: "Le Sacre a eu lieu en 1804."},
                {q: "Qui l'a couronné Empereur ?", opts: ["Lui-même", "Le Pape", "Sa femme", "Le Peuple"], c: 0, w: "Il a posé la couronne lui-même sur sa tête."},
                {q: "Quel est son héritage de lois le plus célèbre ?", opts: ["Le Code Civil", "Code Pénal", "Code Route", "Code Roi"], c: 0, w: "Le Code Napoléon de 1804."},
                {q: "Quelle distinction crée-t-il pour le mérite ?", opts: ["Légion d'Honneur", "Médaille d'Or", "Croix", "Le Ruban"], c: 0, w: "Il a créé la Légion d'Honneur."},
                {q: "Qu'a-t-il fondé pour former l'élite ?", opts: ["Le Lycée", "L'Université", "Le Collège", "La Mairie"], c: 0, w: "Il a fondé les Lycées."}
            ]
        },
        {
            title: "IV. La Gloire (Austerlitz)",
            pos: {t: 60, l: 20}, // España (Suroeste)
            info: "En 1805, <b>Austerlitz</b> (la bataille des Trois Empereurs) est sa plus grande victoire. Son grand rival est l'<b>Angleterre</b>. Après avoir perdu sur mer à <b>Trafalgar</b>, il instaure le <b>Blocus Continental</b> pour empêcher les Anglais de commercer avec l'Europe. Son armée s'appelait la <b>Grande Armée</b>.",
            questions: [
                {q: "Quelle est sa plus grande victoire ?", opts: ["Austerlitz", "Waterloo", "Leipzig", "Madrid"], c: 0, w: "C'est la bataille d'Austerlitz en 1805."},
                {q: "Quel pays était son rival imbattable sur mer ?", opts: ["Angleterre", "Espagne", "Russie", "Prusse"], c: 0, w: "L'Angleterre dominait les mers."},
                {q: "Où perd-il sa flotte contre les Anglais ?", opts: ["Trafalgar", "Wagram", "Lodi", "Borodino"], c: 0, w: "La défaite de Trafalgar en 1805."},
                {q: "Comment s'appelait son armée de légende ?", opts: ["Grande Armée", "Les Bleus", "Légion", "Les Centurions"], c: 0, w: "La Grande Armée."},
                {q: "Quel système isolait économiquement l'Angleterre ?", opts: ["Blocus Continental", "Blocus Naval", "Embargo", "Taxes"], c: 0, w: "Le Blocus Continental."}
            ]
        },
        {
            title: "V. Le Déclin (Russie)",
            pos: {t: 20, l: 85}, // Rusia (Lejano Este)
            info: "En <b>1812</b>, il envahit la <b>Russie</b>. Mais les Russes utilisent la tactique de la <b>terre brûlée</b> (ils brûlent tout avant de reculer). Le plus grand ennemi de Napoléon fut le <b>froid</b> extrême de l'hiver russe. En 1813, il perd la bataille de <b>Leipzig</b> (dite Bataille des Nations).",
            questions: [
                {q: "En quelle année envahit-il la Russie ?", opts: ["1812", "1804", "1815", "1800"], c: 0, w: "L'invasion commence en 1812."},
                {q: "Quelle tactique russe a affamé les Français ?", opts: ["Terre brûlée", "Attaque", "Tranchée", "Guérilla"], c: 0, w: "Tout brûler en reculant."},
                {q: "Quel fut son pire ennemi en Russie ?", opts: ["Le froid", "La mer", "La pluie", "Le vent"], c: 0, w: "Le froid de l'hiver russe."},
                {q: "Quelle bataille perd-il en 1813 ?", opts: ["Leipzig", "Waterloo", "Jena", "Austerlitz"], c: 0, w: "La défaite de Leipzig."},
                {q: "Quel est l'autre nom de la bataille de Leipzig ?", opts: ["Bataille des Nations", "Le Duel", "Chute", "Le Triomphe"], c: 0, w: "On l'appelle la Bataille des Nations."}
            ]
        },
        {
            title: "VI. La Chute (Waterloo)",
            pos: {t: 25, l: 45}, // Waterloo (Bélgica - Norte de París)
            info: "Exilé d'abord sur l'île d'<b>Elbe</b>, il revient pour la période des <b>Cent-Jours</b>. Sa défaite finale a lieu à <b>Waterloo</b> le 18 juin <b>1815</b>. Il meurt exilé sur l'île de <b>Sainte-Hélène</b> le 5 mai <b>1821</b>. Sergio, n'oublie pas ces dates finales !",
            questions: [
                {q: "Où est-il exilé pour la première fois en 1814 ?", opts: ["L'île d'Elbe", "Sainte-Hélène", "Corse", "Malte"], c: 0, w: "Il est envoyé sur l'île d'Elbe."},
                {q: "Sa défaite finale a lieu en 1815 à :", opts: ["Waterloo", "Leipzig", "Jena", "Moscou"], c: 0, w: "La bataille finale est Waterloo."},
                {q: "Comment appelle-t-on son retour en 1815 ?", opts: ["Les Cent-Jours", "Restauration", "Consulat", "Empire"], c: 0, w: "La période des Cent-Jours."},
                {q: "Lieu de son exil final et de sa mort ?", opts: ["Sainte-Hélène", "Elbe", "Sicile", "Madère"], c: 0, w: "Il finit ses jours à Sainte-Hélène."},
                {q: "En quelle année Napoléon meurt-il ?", opts: ["1821", "1815", "1804", "1830"], c: 0, w: "Le 5 mai 1821."}
            ]
        }
    ];

    let currentLvl = 0, currentQ = 0, hp = 3, activeQs = [];

    function initGame() {
        const panel = document.getElementById('map-panel');
        themes.forEach((t, i) => {
            const node = document.createElement('div');
            node.className = 'map-node';
            node.id = `node-${i}`;
            node.style.top = t.pos.t + '%';
            node.style.left = t.pos.l + '%';
            node.innerText = i + 1;
            node.onclick = () => { if(node.classList.contains('active')) startLevel(i); };
            panel.appendChild(node);
        });
        updateVisuals();
    }

    function updateVisuals() {
        themes.forEach((_, i) => {
            const node = document.getElementById(`node-${i}`);
            node.classList.remove('active', 'completed');
            if (i < currentLvl) node.classList.add('completed');
            else if (i === currentLvl) node.classList.add('active');
        });
    }

    function startLevel(idx) {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('summary-screen').classList.remove('hidden');
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('summary-title').innerText = themes[idx].title;
        document.getElementById('summary-text').innerHTML = themes[idx].info;
    }

    function startQuiz() {
        document.getElementById('summary-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        currentQ = 0;
        activeQs = [...themes[currentLvl].questions].sort(() => Math.random() - 0.5);
        loadQ();
    }

    function loadQ() {
        const qData = activeQs[currentQ];
        document.getElementById('question-text').innerText = qData.q;
        document.getElementById('feedback-msg').style.display = 'none';
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('q-counter').innerText = `${currentQ+1}/5`;
        
        const grid = document.getElementById('options-grid');
        grid.innerHTML = '';
        
        // Mapear opciones con ID original para detectar correcta
        const opts = qData.opts.map((text, index) => ({text, originalIndex: index}));
        opts.sort(() => Math.random() - 0.5);

        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = 'btn-choice';
            b.innerText = o.text;
            b.id = `opt-${o.originalIndex}`;
            b.onclick = () => check(o.originalIndex, qData);
            grid.appendChild(b);
        });
    }

    function check(selectedIndex, data) {
        const btns = document.querySelectorAll('.btn-choice');
        btns.forEach(b => b.disabled = true);
        
        const correctIndex = data.c;
        const selectedBtn = document.getElementById(`opt-${selectedIndex}`);
        const correctBtn = document.getElementById(`opt-${correctIndex}`);

        if (selectedIndex === correctIndex) {
            // VERDE para el correcto
            selectedBtn.classList.add('choice-correct');
        } else {
            // ROJO para el incorrecto
            selectedBtn.classList.add('choice-incorrect');
            // Resaltar el correcto (Verde parpadeante)
            correctBtn.classList.add('choice-correct', 'highlight-correct');
            
            hp--;
            updateHP();
            if (hp <= 0) { end(false); return; }
        }
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function processNextQuestion() {
        currentQ++;
        if (currentQ < 5) loadQ();
        else {
            currentLvl++;
            if (currentLvl < themes.length) {
                updateVisuals();
                document.getElementById('quiz-screen').classList.add('hidden');
                document.getElementById('start-screen').classList.remove('hidden');
                document.getElementById('start-screen').querySelector('p').innerHTML = "Bravo Sergio ! Clique sur le <b>numéro " + (currentLvl+1) + "</b> pour continuer.";
            } else end(true);
        }
    }

    function updateHP() { 
        document.getElementById('hp-display').innerHTML = '❤️'.repeat(hp) + '🖤'.repeat(3-hp); 
    }

    function end(win) {
        document.getElementById('game-content').classList.add('hidden');
        const es = document.getElementById('end-screen');
        es.classList.remove('hidden');
        document.getElementById('end-title').innerText = win ? "VICTOIRE !" : "DÉFAITE TACTIQUE";
        document.getElementById('end-title').style.color = win ? "#22c55e" : "#ef4444";
        document.getElementById('end-message').innerText = win ? "Félicitations Sergio ! Tu as maîtrisé l'histoire de Napoléon." : "Sergio, les troupes sont décimées. Relis bien pour mieux répondre.";
    }

    initGame();
</script>
</body>
</html>
