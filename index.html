<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Napoléon : La Marche du Savoir</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700&display=swap');
        body { background-color: #e5cfa1; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        #main-container { display: flex; height: 100%; width: 100%; }
        #quiz-panel { flex: 0 0 35%; background: rgba(255, 252, 240, 0.98); border-right: 4px double #5d4037; padding: 2rem; z-index: 100; overflow-y: auto; }
        
        /* Panel del Mapa corregido para tu archivo en GitHub */
        #map-panel {
            flex: 1;
            position: relative;
            background-image: url('mapa_anpoleon.png'); /* Nombre exacto que tienes en GitHub */
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            border: 10px solid #5d4037;
        }

        #knight-icon {
            position: absolute;
            font-size: 50px;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
            transform: translate(-50%, -50%);
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.4));
        }

        .btn-choice { background: white; border: 2px solid #5d4037; padding: 12px; margin: 5px 0; width: 100%; text-align: left; border-radius: 8px; transition: 0.2s; }
        .btn-choice:hover { background: #5d4037; color: white; }
        .feedback-box { display: none; padding: 1rem; margin-top: 1rem; border-radius: 8px; border: 2px solid #ffa000; background: #fff3e0; }
        .font-fantasy { font-family: 'Cinzel', serif; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="quiz-panel">
        <div class="flex justify-between items-center mb-6 border-b-2 border-amber-900 pb-2">
            <div id="hp-container">❤️❤️❤️</div>
            <div class="text-right">
                <p id="lvl-title" class="font-fantasy text-amber-900 text-sm">Départ</p>
                <p id="lvl-count" class="text-xs italic text-gray-600">Question 1/5</p>
            </div>
        </div>

        <div id="game-content">
            <div id="start-screen" class="text-center">
                <h1 class="text-2xl font-fantasy font-bold mb-4 text-amber-950">NAPOLÉON : LA MARCHE DU SAVOIR</h1>
                <p class="text-sm text-gray-700 mb-8 italic text-justify">Chaque bonne réponse fait avancer Napoléon d'un pas sur votre carte. Maîtrisez l'histoire pour conquérir l'Europe.</p>
                <button onclick="nextStep()" class="w-full bg-amber-950 text-white py-4 font-bold rounded shadow-lg">LANCER LA CAMPAGNE</button>
            </div>

            <div id="summary-screen" class="hidden">
                <h2 id="summary-name" class="text-xl font-fantasy font-bold mb-3 text-amber-900 border-b"></h2>
                <p id="summary-text" class="text-sm italic text-gray-700 mb-6 leading-relaxed"></p>
                <button onclick="startQuestions()" class="w-full bg-green-800 text-white py-4 font-bold rounded uppercase">Relever le défi</button>
            </div>

            <div id="quiz-screen" class="hidden">
                <p id="question-text" class="font-bold text-lg mb-6 text-gray-950 leading-tight"></p>
                <div id="options-grid"></div>
                <div id="feedback-box" class="feedback-box"></div>
                <button id="next-q-btn" onclick="processNextQuestion()" class="hidden w-full mt-6 bg-amber-950 text-white py-4 font-bold rounded">CONTINUER LA MARCHE</button>
            </div>

            <div id="end-screen" class="hidden text-center">
                <h2 id="end-title" class="text-3xl font-fantasy font-bold mb-4"></h2>
                <p id="end-msg" class="mb-8 text-lg"></p>
                <button onclick="location.reload()" class="bg-amber-950 text-white px-10 py-4 rounded font-bold">RECOMMENCER</button>
            </div>
        </div>
    </div>

    <div id="map-panel">
        <div id="knight-icon">🏇</div>
    </div>
</div>

<script>
    const levels = [
        {
            name: "1. Révolution & Ascension",
            summary: "De la Corse à Paris, Napoléon devient un héros de la Révolution. Réfléchissez : comment le chaos peut-il révéler un génie ?",
            questions: [
                { q: "Où Napoléon est-il né ?", options: ["Ajaccio", "Bastia", "Paris", "Marseille"], correct: 0, why: "Il est né en Corse en 1769." },
                { q: "Quel événement a favorisé sa carrière ?", options: ["La Révolution française", "Une élection", "Un héritage", "Le hasard"], correct: 0, why: "La Révolution a permis aux talents militaires de monter rapidement." },
                { q: "Quelle était sa spécialité militaire ?", options: ["L'Artillerie", "La Cavalerie", "La Marine", "L'Infanterie"], correct: 0, why: "C'était un maître des canons." },
                { q: "À quel âge est-il devenu Général ?", options: ["24 ans", "40 ans", "35 ans", "50 ans"], correct: 0, why: "Son talent à Toulon l'a propulsé Général de brigade à 24 ans." },
                { q: "Son surnom par ses soldats ?", options: ["Le Petit Caporal", "L'Empereur", "Le Grand", "Le Roi"], correct: 0, why: "Un surnom affectueux né lors de la campagne d'Italie." }
            ]
        },
        {
            name: "2. Campagnes d'Italie & Égypte",
            summary: "Napoléon conquiert l'Italie et rêve d'Orient. Ses victoires foudroyantes étonnent le monde entier.",
            questions: [
                { q: "Quelle grande campagne mène-t-il en 1796 ?", options: ["L'Italie", "La Russie", "L'Espagne", "L'Allemagne"], correct: 0, why: "C'est sa première campagne légendaire." },
                { q: "Quel pays Napoléon voulait-il couper de l'Inde en Égypte ?", options: ["L'Angleterre", "La Russie", "L'Espagne", "L'Italie"], correct: 0, why: "Il voulait frapper les intérêts commerciaux britanniques." },
                { q: "Contre quelle puissance se bat-il en Italie ?", options: ["L'Autriche", "La Prusse", "La Suède", "Le Portugal"], correct: 0, why: "L'Autriche dominait alors le nord de l'Italie." },
                { q: "Quelle bataille a-t-il remportée en Égypte ?", options: ["Les Pyramides", "Waterloo", "Jena", "Trafalgar"], correct: 0, why: "La célèbre bataille face aux Mamelouks." },
                { q: "Quel titre prend-il après le coup d'État ?", options: ["Premier Consul", "Président", "Directeur", "Roi"], correct: 0, why: "Le Consulat marque le début de son pouvoir politique." }
            ]
        }
    ];

    let currentLvlIdx = -1;
    let currentQIdx = 0;
    let hp = 3;
    let activeQuestions = [];

    // Coordenadas calculadas para que avance paso a paso sobre el mapa
    const nodes = [
        {t: 25, l: 15}, // Inicio
        {t: 27, l: 17}, {t: 29, l: 19}, {t: 31, l: 21}, {t: 33, l: 23}, {t: 35, l: 25}, // Nivel 1 pasos
        {t: 40, l: 27}, // Nivel 2 Inicio
        {t: 43, l: 30}, {t: 46, l: 33}, {t: 49, l: 36}, {t: 52, l: 39}, {t: 55, l: 42}  // Nivel 2 pasos
    ];

    const knight = document.getElementById('knight-icon');

    function moveKnight() {
        // El caballo avanza a la siguiente coordenada del array 'nodes'
        let stepIndex = (currentLvlIdx * 6) + (currentQIdx + 1);
        if (currentLvlIdx === -1) stepIndex = 0;
        
        const target = nodes[stepIndex] || nodes[nodes.length - 1];
        knight.style.top = target.t + "%";
        knight.style.left = target.l + "%";
    }

    function nextStep() {
        currentLvlIdx++;
        if (currentLvlIdx >= levels.length) return showEnd(true);
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('summary-screen').classList.remove('hidden');
        document.getElementById('summary-name').innerText = levels[currentLvlIdx].name;
        document.getElementById('summary-text').innerText = levels[currentLvlIdx].summary;
        document.getElementById('lvl-title').innerText = levels[currentLvlIdx].name;
    }

    function startQuestions() {
        document.getElementById('summary-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        currentQIdx = 0;
        activeQuestions = [...levels[currentLvlIdx].questions].sort(() => Math.random() - 0.5);
        showQuestion();
    }

    function showQuestion() {
        const qData = activeQuestions[currentQIdx];
        document.getElementById('lvl-count').innerText = `Question ${currentQIdx + 1} / 5`;
        document.getElementById('question-text').innerText = qData.q;
        document.getElementById('feedback-box').style.display = 'none';
        document.getElementById('next-q-btn').classList.add('hidden');
        const grid = document.getElementById('options-grid');
        grid.innerHTML = '';
        
        const opts = qData.options.map((o, i) => ({text:o, id:i})).sort(() => Math.random() - 0.5);
        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = 'btn-choice';
            b.innerText = o.text;
            b.onclick = () => checkAnswer(o.id, qData.correct);
            grid.appendChild(b);
        });
    }

    function checkAnswer(sel, cor) {
        const fb = document.getElementById('feedback-box');
        const qData = activeQuestions[currentQIdx];
        document.querySelectorAll('.btn-choice').forEach(b => b.disabled = true);
        
        if (sel === cor) {
            moveKnight(); // AVANCE VISUAL INMEDIATO
            fb.style.display = 'block';
            fb.innerHTML = `<b class="text-green-700">EXCELLENT !</b><br>${qData.why}`;
        } else {
            hp--;
            document.getElementById('hp-container').innerText = '❤️'.repeat(hp) + '🖤'.repeat(3-hp);
            fb.style.display = 'block';
            fb.innerHTML = `<b class="text-red-700">ERREUR.</b><br>La réponse était : <i>${qData.options[cor]}</i>.<br>${qData.why}`;
            if (hp <= 0) return showEnd(false);
        }
        document.getElementById('next-q-btn').classList.remove('hidden');
    }

    function processNextQuestion() {
        currentQIdx++;
        if (currentQIdx < 5) showQuestion();
        else nextStep();
    }

    function showEnd(win) {
        document.getElementById('game-content').classList.add('hidden');
        const end = document.getElementById('end-screen');
        end.classList.remove('hidden');
        end.querySelector('h2').innerText = win ? "GÉANT DE L'HISTOIRE" : "L'EXIL";
        document.getElementById('end-msg').innerText = win ? "Napoléon a conquis l'Europe grâce à vous !" : "Votre campagne s'arrête ici.";
    }

    window.onload = () => { moveKnight(); };
</script>
</body>
</html>
