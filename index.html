<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Napoléon : La Marche du Savoir</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700&display=swap');
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #e5cfa1; }
        
        #main-container { display: flex; height: 100vh; width: 100vw; }

        /* Panel de preguntas izquierdo */
        #quiz-panel { 
            flex: 0 0 350px; 
            background: rgba(255, 252, 240, 0.98); 
            border-right: 5px double #5d4037; 
            padding: 1.5rem; 
            z-index: 100; 
            display: flex; 
            flex-direction: column;
            box-shadow: 5px 0 15px rgba(0,0,0,0.2);
        }

        /* PANEL DEL MAPA - Aquí está el secreto */
        #map-panel {
            flex: 1;
            position: relative;
            /* Intentamos cargar la imagen con el nombre exacto de tu GitHub */
            background-image: url('mapa_anpoleon.png'); 
            background-size: cover; /* Cubre todo el espacio disponible */
            background-position: center;
            background-repeat: no-repeat;
            background-color: #d4bc8d; /* Color de fondo si la imagen falla */
            border: 10px solid #5d4037;
        }

        /* El Caballero (Napoleón) */
        #knight-icon {
            position: absolute;
            font-size: 55px;
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
            transform: translate(-50%, -50%); /* Centrado exacto en el punto */
            filter: drop-shadow(3px 5px 5px rgba(0,0,0,0.5));
        }

        .btn-choice { 
            background: white; 
            border: 2px solid #5d4037; 
            padding: 10px; 
            margin: 4px 0; 
            width: 100%; 
            text-align: left; 
            border-radius: 8px; 
            font-size: 0.9rem;
            transition: 0.2s; 
        }
        .btn-choice:hover { background: #5d4037; color: white; transform: scale(1.02); }
        
        .feedback-box { display: none; padding: 1rem; margin-top: 1rem; border-radius: 8px; border: 2px solid #ffa000; background: #fff3e0; font-size: 0.85rem; }
        .font-fantasy { font-family: 'Cinzel', serif; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="quiz-panel">
        <div class="flex justify-between items-center mb-4 border-b-2 border-amber-900 pb-2">
            <div id="hp-container" class="text-xl">❤️❤️❤️</div>
            <div class="text-right">
                <p id="lvl-title" class="font-fantasy text-amber-900 text-xs">Campagne</p>
                <p id="lvl-count" class="text-[10px] italic text-gray-600">Progrès</p>
            </div>
        </div>

        <div id="game-content" class="flex-1 overflow-y-auto">
            <div id="start-screen" class="text-center py-4">
                <h1 class="text-xl font-fantasy font-bold mb-4 text-amber-950">NAPOLÉON : LA MARCHE</h1>
                <p class="text-xs text-gray-700 mb-6 italic">Apprenez l'histoire pour faire avancer le chevalier sur la carte.</p>
                <button onclick="nextStep()" class="w-full bg-amber-950 text-white py-4 font-bold rounded shadow-lg">COMMENCER</button>
            </div>

            <div id="summary-screen" class="hidden">
                <h2 id="summary-name" class="text-lg font-fantasy font-bold mb-2 text-amber-900 border-b"></h2>
                <p id="summary-text" class="text-xs italic text-gray-700 mb-4 leading-tight"></p>
                <button onclick="startQuestions()" class="w-full bg-green-800 text-white py-3 font-bold rounded uppercase text-sm">Répondre</button>
            </div>

            <div id="quiz-screen" class="hidden">
                <p id="question-text" class="font-bold text-sm mb-4 text-gray-950"></p>
                <div id="options-grid"></div>
                <div id="feedback-box" class="feedback-box"></div>
                <button id="next-q-btn" onclick="processNextQuestion()" class="hidden w-full mt-4 bg-amber-950 text-white py-3 font-bold rounded text-sm">AVANCER</button>
            </div>

            <div id="end-screen" class="hidden text-center py-10">
                <h2 id="end-title" class="text-2xl font-fantasy font-bold mb-4"></h2>
                <p id="end-msg" class="mb-6 text-sm"></p>
                <button onclick="location.reload()" class="bg-amber-950 text-white px-8 py-3 rounded font-bold">RETOUR</button>
            </div>
        </div>
    </div>

    <div id="map-panel">
        <div id="knight-icon">🏇</div>
    </div>
</div>

<script>
    // Datos de niveles (Ajustados a tu imagen)
    const levels = [
        {
            name: "I. Révolution & Consulat",
            summary: "L'ascension fulgurante d'un jeune corse à Paris. Réfléchissez : comment le courage transforme un soldat en leader ?",
            questions: [
                { q: "Où est né Napoléon ?", options: ["Ajaccio", "Paris", "Marseille", "Bastia"], correct: 0, why: "Il est né en Corse en 1769." },
                { q: "Son arme de prédilection ?", options: ["L'Artillerie", "La Cavalerie", "L'Infanterie", "La Marine"], correct: 0, why: "C'était un maître des canons." },
                { q: "Année du coup d'État ?", options: ["1799", "1804", "1789", "1815"], correct: 0, why: "Le 18 Brumaire 1799." },
                { q: "Son premier titre ?", options: ["Premier Consul", "Empereur", "Roi", "Président"], correct: 0, why: "Il a dirigé le Consulat avant l'Empire." },
                { q: "Son épouse ?", options: ["Joséphine", "Marie", "Victoria", "Louise"], correct: 0, why: "Joséphine de Beauharnais." }
            ]
        },
        {
            name: "II. L'Empire & Les Victoires",
            summary: "Napoléon est sacré Empereur. Il domine l'Europe de l'Italie à l'Autriche.",
            questions: [
                { q: "Année du Sacre ?", options: ["1804", "1800", "1799", "1812"], correct: 0, why: "Le 2 décembre 1804 à Notre-Dame." },
                { q: "Sa plus grande victoire ?", options: ["Austerlitz", "Waterloo", "Trafalgar", "Madrid"], correct: 0, why: "La bataille des Trois Empereurs (1805)." },
                { q: "Le Code qu'il a créé ?", options: ["Code Civil", "Code Pénal", "Code Militaire", "Code Social"], correct: 0, why: "Le Code Civil de 1804." },
                { q: "Ennemi principal ?", options: ["Angleterre", "USA", "Chine", "Suède"], correct: 0, why: "La 'Perfide Albion' était son grand rival." },
                { q: "Son drapeau ?", options: ["Bleu, Blanc, Rouge", "Vert", "Blanc", "Jaune"], correct: 0, why: "Il a porté les couleurs de la Révolution." }
            ]
        }
    ];

    let currentLvlIdx = -1;
    let currentQIdx = 0;
    let hp = 3;
    let activeQuestions = [];

    // RUTA DE PASOS SOBRE TU MAPA (Coordenadas XY %)
    const nodes = [
        {t: 30, l: 20}, // Inicio
        {t: 28, l: 25}, {t: 26, l: 30}, {t: 24, l: 35}, {t: 22, l: 40}, {t: 20, l: 45}, // Nivel 1
        {t: 25, l: 50}, // Nivel 2 Inicio
        {t: 30, l: 55}, {t: 35, l: 60}, {t: 40, l: 65}, {t: 45, l: 70}, {t: 50, l: 75}  // Nivel 2 pasos
    ];

    const knight = document.getElementById('knight-icon');

    function moveKnight() {
        let step = (currentLvlIdx * 6) + (currentQIdx + 1);
        if (currentLvlIdx === -1) step = 0;
        const target = nodes[step] || nodes[nodes.length - 1];
        knight.style.top = target.t + "%";
        knight.style.left = target.l + "%";
    }

    function nextStep() {
        currentLvlIdx++;
        if (currentLvlIdx >= levels.length) return showEnd(true);
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('summary-screen').classList.remove('hidden');
        document.getElementById('summary-name').innerText = levels[currentLvlIdx].name;
        document.getElementById('summary-text').innerText = levels[currentLvlIdx].summary;
        document.getElementById('lvl-title').innerText = levels[currentLvlIdx].name;
        moveKnight();
    }

    function startQuestions() {
        document.getElementById('summary-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        currentQIdx = 0;
        activeQuestions = [...levels[currentLvlIdx].questions].sort(() => Math.random() - 0.5);
        showQuestion();
    }

    function showQuestion() {
        const qData = activeQuestions[currentQIdx];
        document.getElementById('lvl-count').innerText = `Question ${currentQIdx + 1} / 5`;
        document.getElementById('question-text').innerText = qData.q;
        document.getElementById('feedback-box').style.display = 'none';
        document.getElementById('next-q-btn').classList.add('hidden');
        const grid = document.getElementById('options-grid');
        grid.innerHTML = '';
        
        const opts = qData.options.map((o, i) => ({text:o, id:i})).sort(() => Math.random() - 0.5);
        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = 'btn-choice';
            b.innerText = o.text;
            b.onclick = () => checkAnswer(o.id, qData.correct);
            grid.appendChild(b);
        });
    }

    function checkAnswer(sel, cor) {
        const fb = document.getElementById('feedback-box');
        const qData = activeQuestions[currentQIdx];
        document.querySelectorAll('.btn-choice').forEach(b => b.disabled = true);
        
        if (sel === cor) {
            moveKnight(); // AVANCE VISUAL
            fb.style.display = 'block';
            fb.innerHTML = `<b class="text-green-700">OUI !</b><br>${qData.why}`;
        } else {
            hp--;
            document.getElementById('hp-container').innerText = '❤️'.repeat(hp) + '🖤'.repeat(3-hp);
            fb.style.display = 'block';
            fb.innerHTML = `<b class="text-red-700">NON.</b><br>Réponse: ${qData.options[cor]}`;
            if (hp <= 0) return showEnd(false);
        }
        document.getElementById('next-q-btn').classList.remove('hidden');
    }

    function processNextQuestion() {
        currentQIdx++;
        if (currentQIdx < 5) showQuestion();
        else nextStep();
    }

    function showEnd(win) {
        document.getElementById('game-content').classList.add('hidden');
        const end = document.getElementById('end-screen');
        end.classList.remove('hidden');
        end.querySelector('h2').innerText = win ? "VICTOIRE" : "DÉFAITE";
        document.getElementById('end-msg').innerText = win ? "Napoléon a conquis l'Europe !" : "Campagne terminée.";
    }

    window.onload = () => { moveKnight(); };
</script>
</body>
</html>
