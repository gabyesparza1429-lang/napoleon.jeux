<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Napoléon : La Marche du Savoir</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700&display=swap');
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #f3e5ab; }
        #main-container { display: flex; height: 100vh; width: 100vw; }

        #quiz-panel { 
            flex: 0 0 380px; 
            background: #fffdfa; 
            border-right: 5px double #5d4037; 
            padding: 1.5rem; 
            z-index: 100; 
            display: flex; 
            flex-direction: column;
            box-shadow: 10px 0 20px rgba(0,0,0,0.1);
        }

        /* EL MAPA - Corregido */
        #map-panel {
            flex: 1;
            position: relative;
            /* Usamos el nombre exacto que tienes en GitHub */
            background-image: url('mapa_anpoleon.png'); 
            background-size: contain; /* Para que se vea todo el mapa sin recortes */
            background-repeat: no-repeat;
            background-position: center;
            /* Quitamos el color café que tapaba */
            background-color: transparent; 
        }

        #knight-icon {
            position: absolute;
            font-size: 50px;
            transition: all 0.8s ease-in-out;
            z-index: 50;
            transform: translate(-50%, -50%);
            filter: drop-shadow(3px 3px 5px rgba(0,0,0,0.4));
        }

        .btn-choice { 
            background: white; 
            border: 2px solid #5d4037; 
            padding: 12px; 
            margin: 6px 0; 
            width: 100%; 
            text-align: left; 
            border-radius: 8px; 
            font-size: 0.95rem;
            transition: 0.2s; 
        }
        .btn-choice:hover { background: #5d4037; color: white; }
        
        .feedback-box { display: none; padding: 1rem; margin-top: 1rem; border-radius: 8px; border: 2px solid #ffa000; background: #fff3e0; }
        .font-fantasy { font-family: 'Cinzel', serif; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="quiz-panel">
        <div class="flex justify-between items-center mb-6 border-b-2 border-amber-900 pb-2">
            <div id="hp-container">❤️❤️❤️</div>
            <div class="text-right">
                <p id="lvl-title" class="font-fantasy text-amber-900 text-sm">Campagne</p>
                <p id="lvl-count" class="text-xs italic">Niveau 1</p>
            </div>
        </div>

        <div id="game-content">
            <div id="start-screen" class="text-center">
                <h1 class="text-2xl font-fantasy font-bold mb-4">NAPOLÉON : LA MARCHE</h1>
                <p class="text-sm text-gray-700 mb-8 italic">Le chevalier avance à chaque bonne réponse. Conquérez la carte !</p>
                <button onclick="nextStep()" class="w-full bg-amber-950 text-white py-4 font-bold rounded shadow-lg">COMMENCER</button>
            </div>

            <div id="summary-screen" class="hidden">
                <h2 id="summary-name" class="text-xl font-fantasy font-bold mb-3 text-amber-900"></h2>
                <p id="summary-text" class="text-xs italic text-gray-700 mb-6"></p>
                <button onclick="startQuestions()" class="w-full bg-green-800 text-white py-4 font-bold rounded">RÉPONDRE</button>
            </div>

            <div id="quiz-screen" class="hidden">
                <p id="question-text" class="font-bold text-lg mb-6 text-gray-950"></p>
                <div id="options-grid"></div>
                <div id="feedback-box" class="feedback-box"></div>
                <button id="next-q-btn" onclick="processNextQuestion()" class="hidden w-full mt-6 bg-amber-950 text-white py-4 font-bold rounded">CONTINUER</button>
            </div>

            <div id="end-screen" class="hidden text-center">
                <h2 id="end-title" class="text-3xl font-fantasy font-bold mb-4"></h2>
                <p id="end-msg" class="mb-8"></p>
                <button onclick="location.reload()" class="bg-amber-950 text-white px-10 py-4 rounded font-bold">RETOUR</button>
            </div>
        </div>
    </div>

    <div id="map-panel">
        <div id="knight-icon">🏇</div>
    </div>
</div>

<script>
    const levels = [
        {
            name: "I. Révolution",
            summary: "L'ascension d'un jeune corse à Paris. Réfléchissez : comment devient-on un leader ?",
            questions: [
                { q: "Où est né Napoléon ?", options: ["Ajaccio", "Paris", "Marseille", "Bastia"], correct: 0, why: "Il est né en Corse en 1769." },
                { q: "Son arme favorite ?", options: ["L'Artillerie", "Cavalerie", "Marine", "Infanterie"], correct: 0, why: "Génie des canons." },
                { q: "Année du Sacre ?", options: ["1804", "1789", "1815", "1799"], correct: 0, why: "Sacre à Notre-Dame en 1804." },
                { q: "Son premier titre ?", options: ["Premier Consul", "Empereur", "Roi", "Duc"], correct: 0, why: "Il dirige le Consulat en 1799." },
                { q: "Son Code célèbre ?", options: ["Code Civil", "Code Pénal", "Code Rural", "Code Roi"], correct: 0, why: "Créé en 1804." }
            ]
        },
        {
            name: "II. L'Empire",
            summary: "Napoléon domine l'Europe. Ses victoires sont légendaires.",
            questions: [
                { q: "Bataille de 1805 ?", options: ["Austerlitz", "Waterloo", "Jena", "Moscou"], correct: 0, why: "Sa plus grande victoire." },
                { q: "Son ennemi principal ?", options: ["Angleterre", "Chine", "USA", "Suède"], correct: 0, why: "La puissance navale ennemie." },
                { q: "Où est-il allé en 1812 ?", options: ["Russie", "Espagne", "Égypte", "Italie"], correct: 0, why: "La campagne de Russie." },
                { q: "Qui a gagné à Waterloo ?", options: ["Wellington", "Napoléon", "César", "Nelson"], correct: 0, why: "La défaite finale de l'Empereur." },
                { q: "Lieu de sa mort ?", options: ["Sainte-Hélène", "Elbe", "Paris", "Corse"], correct: 0, why: "Exilé sur cette île isolée." }
            ]
        }
    ];

    let currentLvlIdx = -1;
    let currentQIdx = 0;
    let hp = 3;
    let activeQuestions = [];

    // COORDENADAS PARA TU MAPA (Ajustadas)
    const nodes = [
        {t: 30, l: 20}, // Inicio
        {t: 28, l: 25}, {t: 26, l: 30}, {t: 24, l: 35}, {t: 22, l: 40}, {t: 20, l: 45}, // Avance Lvl 1
        {t: 30, l: 50}, // Inicio Lvl 2
        {t: 35, l: 55}, {t: 40, l: 60}, {t: 45, l: 65}, {t: 50, l: 70}, {t: 55, l: 75}  // Avance Lvl 2
    ];

    const knight = document.getElementById('knight-icon');

    function moveKnight() {
        let step = (currentLvlIdx * 6) + (currentQIdx + 1);
        if (currentLvlIdx === -1) step = 0;
        const target = nodes[step] || nodes[nodes.length - 1];
        knight.style.top = target.t + "%";
        knight.style.left = target.l + "%";
    }

    function nextStep() {
        currentLvlIdx++;
        if (currentLvlIdx >= levels.length) return showEnd(true);
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('summary-screen').classList.remove('hidden');
        document.getElementById('summary-name').innerText = levels[currentLvlIdx].name;
        document.getElementById('summary-text').innerText = levels[currentLvlIdx].summary;
    }

    function startQuestions() {
        document.getElementById('summary-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        currentQIdx = 0;
        activeQuestions = [...levels[currentLvlIdx].questions].sort(() => Math.random() - 0.5);
        showQuestion();
    }

    function showQuestion() {
        const qData = activeQuestions[currentQIdx];
        document.getElementById('question-text').innerText = qData.q;
        document.getElementById('feedback-box').style.display = 'none';
        document.getElementById('next-q-btn').classList.add('hidden');
        const grid = document.getElementById('options-grid');
        grid.innerHTML = '';
        const opts = qData.options.map((o, i) => ({t:o, id:i})).sort(() => Math.random() - 0.5);
        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = 'btn-choice';
            b.innerText = o.t;
            b.onclick = () => checkAnswer(o.id, qData.correct);
            grid.appendChild(b);
        });
    }

    function checkAnswer(sel, cor) {
        document.querySelectorAll('.btn-choice').forEach(b => b.disabled = true);
        const fb = document.getElementById('feedback-box');
        if (sel === cor) {
            moveKnight(); // El caballo se mueve EN EL MOMENTO del acierto
            fb.style.display = 'block';
            fb.innerHTML = `<b class="text-green-700">OUI !</b><br>${activeQuestions[currentQIdx].why}`;
        } else {
            hp--;
            document.getElementById('hp-container').innerText = '❤️'.repeat(hp) + '🖤'.repeat(3-hp);
            fb.style.display = 'block';
            fb.innerHTML = `<b class="text-red-700">ERREUR.</b><br>Réponse: ${activeQuestions[currentQIdx].options[cor]}`;
            if (hp <= 0) return showEnd(false);
        }
        document.getElementById('next-q-btn').classList.remove('hidden');
    }

    function processNextQuestion() {
        currentQIdx++;
        if (currentQIdx < 5) showQuestion();
        else nextStep();
    }

    function showEnd(win) {
        document.getElementById('game-content').classList.add('hidden');
        document.getElementById('end-screen').classList.remove('hidden');
        document.getElementById('end-title').innerText = win ? "VICTOIRE" : "DÉFAITE";
        document.getElementById('end-msg').innerText = win ? "Napoléon a conquis la carte !" : "Fin de la campagne.";
    }

    window.onload = () => moveKnight();
</script>
</body>
</html>
