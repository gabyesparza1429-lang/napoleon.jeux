<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Napoléon : Mission Mémoire (Gaby & Sergio)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700&display=swap');
        
        :root {
            --parchment: #FDF5E6;
            --ink: #4B3621;
            --sepia: #6F4E37;
        }

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #E5D3B3; color: var(--ink); font-family: 'Inter', sans-serif; }
        #main-container { display: flex; height: 100vh; width: 100vw; }
        
        /* Panel izquierdo de interfaz */
        #left-panel { 
            flex: 0 0 460px; 
            background-color: var(--parchment); 
            border-right: 6px double var(--sepia); 
            padding: 2.5rem; 
            display: flex; 
            flex-direction: column; 
            z-index: 1000; 
            box-shadow: 10px 0 25px rgba(0,0,0,0.3); 
        }

        /* Panel del mapa */
        #map-panel { 
            flex: 1; 
            position: relative; 
            background-image: url('https://raw.githubusercontent.com/gabyesparza1429-lang/napoleon.jeux/main/mapa_napoleon.jpg'); 
            background-size: 100% 100%; 
            background-repeat: no-repeat; 
            background-position: center; 
            border: 12px solid var(--sepia); 
            background-color: #d4bc8d;
        }

        /* Estilo de los números en el mapa */
        .map-node { 
            position: absolute; width: 65px; height: 65px; border-radius: 50%; background: #D2B48C; 
            border: 4px solid var(--sepia); display: flex; align-items: center; justify-content: center; 
            font-family: 'Cinzel', serif; font-weight: bold; font-size: 28px; transform: translate(-50%, -50%); 
            z-index: 500; cursor: not-allowed; opacity: 0.4; transition: all 0.5s; 
            box-shadow: 3px 3px 10px rgba(0,0,0,0.5);
        }

        .map-node.active { background: #CD853F; color: white; opacity: 1; cursor: pointer; scale: 1.25; box-shadow: 0 0 25px #CD853F; }
        .map-node.completed { background: #2D5A27; color: white; opacity: 1; cursor: pointer; }

        /* Estilo de textos grandes */
        #question-text { font-size: 1.8rem; line-height: 1.3; margin-bottom: 2rem; font-weight: 800; color: #2c1a0a; }
        .summary-content { font-size: 1.3rem; line-height: 1.7; }

        /* Botones de respuesta */
        .btn-choice { 
            background: white; border: 3px solid var(--sepia); padding: 18px; margin: 10px 0; 
            width: 100%; text-align: left; border-radius: 12px; font-size: 1.3rem; color: var(--ink); 
            transition: all 0.2s ease; font-weight: 600; cursor: pointer;
        }
        .btn-choice:hover:not(:disabled) { background: #F5E6D3; transform: scale(1.01); }

        /* Colores de feedback */
        .choice-correct { background-color: #22c55e !important; color: white !important; border-color: #166534 !important; }
        .choice-incorrect { background-color: #ef4444 !important; color: white !important; border-color: #991b1b !important; }
        .highlight-correct { border-color: #22c55e !important; background-color: #dcfce7 !important; color: #166534 !important; }

        .hidden { display: none !important; }
        .font-fantasy { font-family: 'Cinzel', serif; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="left-panel">
        <div class="bg-[#EAD8C0] flex justify-between items-center p-4 rounded-xl border-2 border-[#6F4E37] mb-6">
            <div>
                <span class="text-xs uppercase font-black text-amber-900">Vies de Sergio</span>
                <div id="hp-display" class="text-4xl text-red-600 mt-1">❤️❤️❤️</div>
            </div>
            <div class="text-right">
                <p class="font-fantasy text-[10px] opacity-70">Gaby Projets</p>
                <p id="info-tag" class="text-xs font-black uppercase text-[#6F4E37]">Mission Histoire</p>
            </div>
        </div>

        <div id="game-content" class="flex-1 flex flex-col justify-center overflow-y-auto">
            <div id="start-screen" class="text-center py-6 space-y-8">
                <h1 class="text-4xl font-fantasy text-amber-950 underline decoration-double decoration-amber-800">NAPOLÉON</h1>
                <p class="text-2xl italic text-amber-900 font-medium">Bonjour Sergio ! Clique sur le <b>Numéro 1</b> ou sur le bouton pour commencer.</p>
                <button onclick="startCurrentLevel()" class="w-full bg-[#4B3621] text-white py-6 rounded-2xl font-black uppercase text-xl tracking-widest shadow-2xl hover:bg-black transition-all">COMMENCER LA MISSION</button>
            </div>

            <div id="summary-screen" class="hidden flex flex-col h-full">
                <h2 class="text-3xl font-fantasy border-b-4 border-amber-800 pb-2 mb-4" id="summary-title"></h2>
                <div id="summary-text" class="summary-content text-justify space-y-6 bg-amber-50 p-6 rounded-2xl border-2 border-amber-200 overflow-y-auto"></div>
                <button onclick="startQuiz()" class="w-full mt-auto bg-[#4B3621] text-white py-6 rounded-2xl font-black uppercase text-xl tracking-widest shadow-2xl hover:bg-black">J'AI TOUT LU ➔</button>
            </div>

            <div id="quiz-screen" class="hidden space-y-4">
                <div class="flex justify-between items-end mb-2">
                    <span id="q-counter" class="text-sm font-black bg-amber-900 text-white px-3 py-1 rounded-full">1/5</span>
                </div>
                <p id="question-text"></p>
                <div id="options-grid" class="space-y-3"></div>
                <button id="next-btn" onclick="processNextQuestion()" class="hidden w-full mt-8 bg-[#4B3621] text-white py-6 rounded-2xl font-black text-2xl shadow-2xl hover:bg-black">CONTINUER ➔</button>
            </div>

            <div id="end-screen" class="hidden text-center py-10 space-y-8">
                <h2 id="end-title" class="text-5xl font-fantasy"></h2>
                <p id="end-message" class="text-2xl font-medium"></p>
                <button id="end-action-btn" class="bg-[#4B3621] text-white px-12 py-6 rounded-2xl font-black text-2xl uppercase shadow-xl hover:scale-105 transition-transform"></button>
            </div>
        </div>
    </div>

    <div id="map-panel"></div>
</div>

<script>
    const themes = [
        {
            title: "I. Jeunesse & Ascension",
            pos: {t: 25, l: 20},
            info: "Napoléon Bonaparte est né le <b>15 août 1769 à Ajaccio</b>, en Corse. À l'école militaire, il devient un expert en <b>Artillerie</b> (les canons). Grâce au chaos de la <b>Révolution française</b>, il prouve son talent et devient <b>Général</b> à seulement 24 ans. Ses soldats l'appelaient le <b>'Petit Caporal'</b>.",
            questions: [
                {q: "Où est né Napoléon Bonaparte en 1769 ?", opts: ["Ajaccio", "Paris", "Bastia", "Marseille"], c: 0},
                {q: "Dans quelle arme était-il expert ?", opts: ["Artillerie", "Marine", "Cavalerie", "Infanterie"], c: 0},
                {q: "Quel grade a-t-il obtenu à 24 ans ?", opts: ["Général", "Capitaine", "Colonel", "Sergent"], c: 0},
                {q: "Quel événement a permis son ascension ?", opts: ["La Révolution française", "Un héritage", "La chance", "Le Roi"], c: 0},
                {q: "Quel était son surnom affectueux ?", opts: ["Le Petit Caporal", "L'Ogre", "Le Grand", "L'Aigle"], c: 0}
            ]
        },
        {
            title: "II. Campagnes en Italie",
            pos: {t: 55, l: 20},
            info: "En <b>1796</b>, Napoléon dirige l'<b>Armée d'Italie</b>. Il remporte des victoires foudroyantes contre l'<b>Autriche</b>, notamment à <b>Rivoli</b>. C'est à ce moment-là qu'il devient un véritable <b>Héros National</b> aux yeux des Français.",
            questions: [
                {q: "Quelle armée Napoléon dirige-t-il en 1796 ?", opts: ["L'Armée d'Italie", "L'Armée du Nord", "La Royale", "Le Rhin"], c: 0},
                {q: "Contre quel pays se bat-il en Italie ?", opts: ["L'Autriche", "L'Espagne", "La Russie", "Les USA"], c: 0},
                {q: "Quelle est l'une de ses victoires en Italie ?", opts: ["Rivoli", "Waterloo", "Jena", "Trafalgar"], c: 0},
                {q: "Que devient Napoléon après ses succès ?", opts: ["Héros National", "Simple soldat", "Roi d'Italie", "Écrivain"], c: 0},
                {q: "En quelle année commence cette campagne ?", opts: ["1796", "1804", "1812", "1769"], c: 0}
            ]
        },
        {
            title: "III. Guerra en España",
            pos: {t: 75, l: 20},
            info: "En 1808, Napoléon envahit l'<b>Espagne</b>. Le peuple espagnol résiste violemment en utilisant la <b>Guérilla</b> (petite guerre). Cette guerre dure des années et affaiblit terriblement la <b>Grande Armée</b> de Napoléon.",
            questions: [
                {q: "Quel pays Napoléon envahit-il en 1808 ?", opts: ["L'Espagne", "La Russie", "L'Angleterre", "L'Italie"], c: 0},
                {q: "Quelle tactique de résistance les Espagnols inventent-ils ?", opts: ["La Guérilla", "Le Blocus", "L'Artillerie", "La Cavalerie"], c: 0},
                {q: "Comment s'appelle l'armée de Napoléon ?", opts: ["La Grande Armée", "Les Bleus", "Les Centurions", "Légion"], c: 0},
                {q: "L'Espagne a été pour Napoléon :", opts: ["Un échec épuisant", "Une victoire facile", "Un allié fidèle", "Un désert"], c: 0},
                {q: "En quelle année l'invasion de l'Espagne a-t-elle commencé ?", opts: ["1808", "1815", "1799", "1804"], c: 0}
            ]
        },
        {
            title: "IV. Imperio Francés",
            pos: {t: 45, l: 50},
            info: "En <b>1804</b>, Napoléon devient <b>Empereur</b>. Son plus grand héritage est le <b>Code Civil</b> de 1804, qui garantit l'égalité devant la loi. Il crée aussi la <b>Légion d'Honneur</b> pour récompenser les citoyens méritants.",
            questions: [
                {q: "En quelle année Napoléon devient-il Empereur ?", opts: ["1804", "1799", "1815", "1812"], c: 0},
                {q: "Quel est l'héritage le plus célèbre de Napoléon ?", opts: ["Le Code Civil", "Ses bijoux", "Son cheval", "Ses chapeaux"], c: 0},
                {q: "Que garantit le Code Civil ?", opts: ["L'égalité devant la loi", "Le vol", "Le titre de roi", "Le repos"], c: 0},
                {q: "Quelle distinction Napoléon a-t-il créée ?", opts: ["La Légion d'Honneur", "Le Prix Nobel", "L'Oscar", "Le César"], c: 0},
                {q: "Où a eu lieu le sacre de Napoléon ?", opts: ["Notre-Dame de Paris", "Tour Eiffel", "Versailles", "Rome"], c: 0}
            ]
        },
        {
            title: "V. Invasión de Russie",
            pos: {t: 25, l: 80},
            info: "En <b>1812</b>, Napoléon attaque la <b>Russie</b>. Les Russes pratiquent la politique de la <b>terre brûlée</b>. Le froid glacial de l'<b>hiver russe</b> détruit la Grande Armée pendant sa retraite.",
            questions: [
                {q: "En quelle année envahit-il la Russie ?", opts: ["1812", "1804", "1815", "1800"], c: 0},
                {q: "Quelle tactique les Russes utilisent-ils ?", opts: ["La terre brûlée", "Le blocus", "L'artillerie", "Le duel"], c: 0},
                {q: "Quel fut le pire ennemi en Russie ?", opts: ["Le froid (hiver russe)", "La mer", "La pluie", "La faim"], c: 0},
                {q: "Comment s'appelle son armée ?", opts: ["La Grande Armée", "Les Bleus", "Légion", "Centurions"], c: 0},
                {q: "Résultat de cette campaña ?", opts: ["Désastre total", "Victoire", "Statu quo", "Succès"], c: 0}
            ]
        },
        {
            title: "VI. Waterloo et Exil",
            pos: {t: 60, l: 85},
            info: "Le 18 juin <b>1815</b>, il perd à <b>Waterloo</b>. Il est exilé sur l'île de <b>Sainte-Hélène</b>, dans l'Atlantique, où il meurt le 5 mai <b>1821</b>.",
            questions: [
                {q: "Où a lieu sa dernière bataille ?", opts: ["Waterloo", "Austerlitz", "Leipzig", "Paris"], c: 0},
                {q: "Année de la bataille de Waterloo ?", opts: ["1815", "1821", "1804", "1799"], c: 0},
                {q: "Sur quelle île meurt-il ?", opts: ["Sainte-Hélène", "Elbe", "Corse", "Malte"], c: 0},
                {q: "En quelle année meurt-il ?", opts: ["1821", "1815", "1804", "1830"], c: 0},
                {q: "Comment finit son destin ?", opts: ["Mort en exil", "Roi", "Général aux USA", "Évadé"], c: 0}
            ]
        }
    ];

    let currentLvl = 0, currentQ = 0, hp = 3, activeQs = [];
    window.selectedLvlForQuiz = 0;

    function initGame() {
        const panel = document.getElementById('map-panel');
        panel.innerHTML = '';
        themes.forEach((t, i) => {
            const node = document.createElement('div');
            node.className = 'map-node';
            node.id = `node-${i}`;
            node.style.top = t.pos.t + '%';
            node.style.left = t.pos.l + '%';
            node.innerText = i + 1;
            node.onclick = () => { if(!node.classList.contains('locked')) startLevel(i); };
            panel.appendChild(node);
        });
        updateVisuals();
    }

    function updateVisuals() {
        themes.forEach((_, i) => {
            const node = document.getElementById(`node-${i}`);
            if (node) {
                node.classList.remove('active', 'completed', 'locked');
                if (i < currentLvl) {
                    node.classList.add('completed');
                } else if (i === currentLvl) {
                    node.classList.add('active');
                } else {
                    node.classList.add('locked');
                }
            }
        });
    }

    function startCurrentLevel() {
        startLevel(currentLvl);
    }

    function startLevel(idx) {
        window.selectedLvlForQuiz = idx;
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('summary-screen').classList.remove('hidden');
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('end-screen').classList.add('hidden');
        document.getElementById('game-content').classList.remove('hidden');
        document.getElementById('summary-title').innerText = themes[idx].title;
        document.getElementById('summary-text').innerHTML = themes[idx].info;
    }

    function startQuiz() {
        document.getElementById('summary-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        currentQ = 0;
        const lvlIdx = window.selectedLvlForQuiz;
        activeQs = [...themes[lvlIdx].questions].sort(() => Math.random() - 0.5);
        loadQ();
    }

    function loadQ() {
        const qData = activeQs[currentQ];
        document.getElementById('question-text').innerText = qData.q;
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('q-counter').innerText = `${currentQ+1}/5`;
        const grid = document.getElementById('options-grid');
        grid.innerHTML = '';
        const opts = qData.opts.map((text, index) => ({text, id: index}));
        opts.sort(() => Math.random() - 0.5);
        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = 'btn-choice';
            b.innerText = o.text;
            b.id = `opt-${o.id}`;
            b.onclick = () => check(o.id, qData);
            grid.appendChild(b);
        });
    }

    function check(selectedId, data) {
        const btns = document.querySelectorAll('.btn-choice');
        btns.forEach(b => b.disabled = true);
        const correctId = data.c;
        const selectedBtn = document.getElementById(`opt-${selectedId}`);
        const correctBtn = document.getElementById(`opt-${correctId}`);
        
        if (selectedId === correctId) {
            selectedBtn.classList.add('choice-correct');
        } else {
            selectedBtn.classList.add('choice-incorrect');
            correctBtn.classList.add('choice-correct', 'highlight-correct');
            hp--;
            updateHP();
            if (hp <= 0) { 
                setTimeout(() => end(false), 1000); 
                return; 
            }
        }
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function processNextQuestion() {
        currentQ++;
        if (currentQ < 5) {
            loadQ();
        } else {
            if (window.selectedLvlForQuiz === currentLvl) {
                currentLvl++;
            }
            if (currentLvl < themes.length || window.selectedLvlForQuiz < themes.length - 1) {
                updateVisuals();
                document.getElementById('quiz-screen').classList.add('hidden');
                document.getElementById('start-screen').classList.remove('hidden');
                const nextTxt = (currentLvl < themes.length) ? 
                    `Bravo Sergio ! Clique sur le <b>numéro ${currentLvl + 1}</b> pour continuer.` : 
                    "Excellent ! Tu peux continuer de réviser les étapes précédentes.";
                document.getElementById('start-screen').querySelector('p').innerHTML = nextTxt;
            } else {
                end(true);
            }
        }
    }

    function updateHP() { 
        document.getElementById('hp-display').innerHTML = '❤️'.repeat(hp) + '🖤'.repeat(3-hp); 
    }

    function end(win) {
        document.getElementById('game-content').classList.add('hidden');
        const es = document.getElementById('end-screen');
        es.classList.remove('hidden');
        
        const title = document.getElementById('end-title');
        const msg = document.getElementById('end-message');
        const btn = document.getElementById('end-action-btn');

        if (win) {
            title.innerText = "VICTOIRE !";
            title.style.color = "#22c55e";
            msg.innerText = "Félicitations Sergio ! Tu as maîtrisé l'histoire de Napoléon.";
            btn.innerText = "RECOMMENCER TOUT";
            btn.onclick = () => location.reload();
        } else {
            title.innerText = "DÉFAITE TACTIQUE";
            title.style.color = "#ef4444";
            msg.innerText = "Sergio, les troupes sont décimées. Relis bien pour mieux répondre.";
            btn.innerText = "RÉESSAYER LE NIVEAU";
            btn.onclick = () => {
                hp = 3;
                updateHP();
                startLevel(window.selectedLvlForQuiz);
            };
        }
    }

    window.onload = initGame;
</script>
</body>
</html>
